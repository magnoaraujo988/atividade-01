<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Magno Gomes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div id="logo-nome">
            <img src="logo.png" alt="Logo de Magno" id="logo">
            <h1>Magno Gomes</h1>
        </div>

        <nav>
            <ul>
                <li><a href="#sobre">Sobre Mim</a></li>
                <li><a href="#projetos">Meus Projetos</a></li>
                <li><a href="#contato">Contato</a></li>
                <li><button id="btn-tema">Escuro</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="sobre">
            <h2>Sobre Mim</h2>
            <a href="#" target="_blank">
                <img src="foto_perfil.jpg" alt="Foto de Magno Gomes">
            </a>
            <p>Sou Aluno do curso de Tecnologia em Sistemas para internet, ofertado pela Uespi-uapi, polo brasileira.
            </p>
        </section>

        <section id="projetos">
            <h2>Meus Projetos</h2>
            <div class="projetos-container"></div>
        </section>


        </section>

        <section id="contato">
            <h2>Contato</h2>
            <form action="#" method="post" id="meu-formulario">
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="campo">
                    <label for="msg">Mensagem:</label>
                    <textarea id="msg"></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Magno Gomes</p>
        <span>Todos os direitos reservados</span>
    </footer>

    <script src="script.js"></script>

</body>

</html>
